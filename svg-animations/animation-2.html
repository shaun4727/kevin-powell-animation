<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Synaptic Echo | Premium SVG Animation</title>
		<style>
			:root {
				--bg-color: #0b0c10;
				--t-pulse: 4s;
				--t-flow: 6s;
				--ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
			}

			body,
			html {
				margin: 0;
				padding: 0;
				width: 100vw;
				height: 100vh;
				background-color: var(--bg-color);
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.canvas-container {
				width: 100%;
				max-width: 900px;
				aspect-ratio: 1;
			}

			svg {
				width: 100%;
				height: 100%;
				mix-blend-mode: screen;
			}

			/* Continuous data stream using dash offsets */
			.data-stream {
				stroke-dasharray: 15 150;
				animation: flow var(--t-flow) linear infinite;
			}

			.data-stream-reverse {
				stroke-dasharray: 20 200;
				animation: flow-reverse calc(var(--t-flow) * 1.5) linear infinite;
			}

			/* Pulsing nodes */
			.node-pulse {
				transform-origin: center;
				animation: pulse var(--t-pulse) var(--ease-in-out) infinite alternate;
			}

			.node-pulse:nth-child(even) {
				animation-delay: calc(var(--t-pulse) / -2);
			}

			/* Network breathing */
			.network-layer {
				transform-origin: 500px 500px;
				animation: network-breathe 12s var(--ease-in-out) infinite alternate;
			}

			@keyframes flow {
				from {
					stroke-dashoffset: 1000;
				}
				to {
					stroke-dashoffset: 0;
				}
			}

			@keyframes flow-reverse {
				from {
					stroke-dashoffset: 0;
				}
				to {
					stroke-dashoffset: 1000;
				}
			}

			@keyframes pulse {
				0% {
					transform: scale(0.8);
					opacity: 0.5;
					filter: brightness(1);
				}
				100% {
					transform: scale(1.2);
					opacity: 1;
					filter: brightness(1.5);
				}
			}

			@keyframes network-breathe {
				0% {
					transform: scale(0.98) rotate(-1deg);
				}
				100% {
					transform: scale(1.02) rotate(1deg);
				}
			}
		</style>
	</head>
	<body>
		<div class="canvas-container">
			<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
				<defs>
					<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
						<feGaussianBlur stdDeviation="8" result="blur" />
						<feMerge>
							<feMergeNode in="blur" />
							<feMergeNode in="SourceGraphic" />
						</feMerge>
					</filter>
					<linearGradient id="stream-grad" x1="0%" y1="0%" x2="100%" y2="100%">
						<stop offset="0%" stop-color="#66fcf1" />
						<stop offset="100%" stop-color="#8a2be2" />
					</linearGradient>
				</defs>

				<g class="network-layer">
					<!-- Base faint connections -->
					<g fill="none" stroke="#252733" stroke-width="2">
						<path d="M 200 300 Q 400 100 600 350 T 800 200" />
						<path d="M 150 600 Q 350 800 550 550 T 850 700" />
						<path d="M 200 300 Q 300 500 150 600" />
						<path d="M 600 350 Q 500 450 550 550" />
						<path d="M 800 200 Q 700 450 850 700" />
					</g>

					<!-- Data Streams (Active) -->
					<g
						fill="none"
						stroke="url(#stream-grad)"
						stroke-width="4"
						filter="url(#glow)"
						stroke-linecap="round"
					>
						<path class="data-stream" d="M 200 300 Q 400 100 600 350 T 800 200" />
						<path class="data-stream-reverse" d="M 150 600 Q 350 800 550 550 T 850 700" />
						<path class="data-stream" d="M 200 300 Q 300 500 150 600" />
						<path class="data-stream-reverse" d="M 600 350 Q 500 450 550 550" />
						<path class="data-stream" d="M 800 200 Q 700 450 850 700" />
					</g>

					<!-- Neural Nodes -->
					<g filter="url(#glow)">
						<!-- Node 1 -->
						<g transform="translate(200, 300)" class="node-pulse">
							<circle r="12" fill="#8a2be2" />
							<circle r="20" fill="none" stroke="#66fcf1" stroke-width="1.5" />
						</g>
						<!-- Node 2 -->
						<g transform="translate(600, 350)" class="node-pulse">
							<circle r="15" fill="#66fcf1" />
							<circle r="25" fill="none" stroke="#8a2be2" stroke-width="1.5" />
						</g>
						<!-- Node 3 -->
						<g transform="translate(800, 200)" class="node-pulse">
							<circle r="10" fill="#8a2be2" />
							<circle r="16" fill="none" stroke="#66fcf1" stroke-width="1.5" />
						</g>
						<!-- Node 4 -->
						<g transform="translate(150, 600)" class="node-pulse">
							<circle r="14" fill="#66fcf1" />
							<circle r="22" fill="none" stroke="#8a2be2" stroke-width="1.5" />
						</g>
						<!-- Node 5 -->
						<g transform="translate(550, 550)" class="node-pulse">
							<circle r="18" fill="#8a2be2" />
							<circle r="28" fill="none" stroke="#66fcf1" stroke-width="2" />
						</g>
						<!-- Node 6 -->
						<g transform="translate(850, 700)" class="node-pulse">
							<circle r="12" fill="#66fcf1" />
							<circle r="18" fill="none" stroke="#8a2be2" stroke-width="1.5" />
						</g>
					</g>
				</g>
			</svg>
		</div>
	</body>
</html>
