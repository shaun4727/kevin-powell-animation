<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Astral Torus | Premium SVG Animation</title>
		<style>
			/* =========================================
           Design System & Timing Variables
           ========================================= */
			:root {
				--bg-color: #020204;

				/* Dash Animation Durations (Must be divisible by 18 for perfect loops) */
				--t-dash-out: 7.2s;
				--t-dash-in: 3.6s;

				/* Global Rotation Speeds */
				--t-spin-cw: 90s;
				--t-spin-ccw: 60s;

				/* Core Pulses */
				--t-core: 4s;
			}

			/* =========================================
           Base Layout
           ========================================= */
			body,
			html {
				margin: 0;
				padding: 0;
				width: 100vw;
				height: 100vh;
				background-color: var(--bg-color);
				background: radial-gradient(circle at 50% 50%, #0a0a12 0%, #020204 100%);
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
				font-family:
					system-ui,
					-apple-system,
					sans-serif;
			}

			.canvas-container {
				width: 100%;
				max-width: 1000px;
				aspect-ratio: 1;
				position: relative;
			}

			svg {
				width: 100%;
				height: 100%;
				mix-blend-mode: screen; /* Fuses overlapping neon colors into bright white cores */
			}

			/* =========================================
           Component Animations
           ========================================= */

			/* 1. Global Rotations for the entire Torus groups */
			.spin-slow-cw {
				transform-origin: 500px 500px;
				animation: rotate-cw var(--t-spin-cw) linear infinite;
			}

			.spin-slow-ccw {
				transform-origin: 500px 500px;
				animation: rotate-ccw var(--t-spin-ccw) linear infinite;
			}

			/* 2. Dash Animations (The "Comets") */
			.dash-out {
				/* 15% visible stroke, 85% hidden gap */
				stroke-dasharray: 15 85;
				stroke-linecap: round;
				animation: dash-flow var(--t-dash-out) linear infinite;
			}

			.dash-in {
				/* 25% visible stroke, 75% hidden gap */
				stroke-dasharray: 25 75;
				stroke-linecap: round;
				/* Reverse flow for the inner core */
				animation: dash-flow-rev var(--t-dash-in) linear infinite;
			}

			/* 3. Central Nexus Rings */
			.nexus-ring-1 {
				transform-origin: 500px 500px;
				stroke-dasharray: 4 12;
				animation: rotate-cw 20s linear infinite;
			}

			.nexus-ring-2 {
				transform-origin: 500px 500px;
				stroke-dasharray: 30 60;
				animation: rotate-ccw 12s linear infinite;
			}

			.core-pulse {
				transform-origin: 500px 500px;
				animation: pulse var(--t-core) ease-in-out infinite alternate;
			}

			/* =========================================
           Keyframes
           ========================================= */
			@keyframes rotate-cw {
				from {
					transform: rotate(0deg);
				}
				to {
					transform: rotate(360deg);
				}
			}

			@keyframes rotate-ccw {
				from {
					transform: rotate(360deg);
				}
				to {
					transform: rotate(0deg);
				}
			}

			/* PathLength=100 allows us to animate exactly 1 full cycle flawlessly */
			@keyframes dash-flow {
				from {
					stroke-dashoffset: 100;
				}
				to {
					stroke-dashoffset: 0;
				}
			}

			@keyframes dash-flow-rev {
				from {
					stroke-dashoffset: -100;
				}
				to {
					stroke-dashoffset: 0;
				}
			}

			@keyframes pulse {
				0% {
					transform: scale(0.9);
					opacity: 0.6;
				}
				100% {
					transform: scale(1.15);
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<div class="canvas-container">
			<!-- 1000x1000 coordinate space provides high fidelity for complex geometry -->
			<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
				<defs>
					<!-- Premium Multi-Layered Holographic Glow Filter -->
					<filter id="ultra-glow" x="-50%" y="-50%" width="200%" height="200%">
						<feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
						<feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2" />
						<feGaussianBlur in="SourceGraphic" stdDeviation="30" result="blur3" />
						<feMerge>
							<feMergeNode in="blur3" />
							<feMergeNode in="blur2" />
							<feMergeNode in="blur1" />
							<feMergeNode in="SourceGraphic" />
						</feMerge>
					</filter>

					<!-- Soft Glow for Base Rings -->
					<filter id="soft-glow">
						<feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
						<feMerge>
							<feMergeNode in="blur" />
							<feMergeNode in="SourceGraphic" />
						</feMerge>
					</filter>

					<!-- Outer Cyan-Azure Gradient -->
					<linearGradient id="grad-out" x1="0%" y1="0%" x2="100%" y2="100%">
						<stop offset="0%" stop-color="#00f2fe" />
						<stop offset="100%" stop-color="#4facfe" />
					</linearGradient>

					<!-- Inner Violet-Pink Gradient -->
					<linearGradient id="grad-in" x1="100%" y1="0%" x2="0%" y2="100%">
						<stop offset="0%" stop-color="#c471ed" />
						<stop offset="100%" stop-color="#f64f59" />
					</linearGradient>

					<!-- Master Ellipse Components -->
					<!-- pathLength="100" maps the entire elliptical perimeter to a 0-100 scale -->
					<!-- Base faint rings (Structure) -->
					<ellipse
						id="base-out"
						cx="500"
						cy="500"
						rx="420"
						ry="140"
						fill="none"
						stroke="rgba(255, 255, 255, 0.05)"
						stroke-width="1"
					/>
					<ellipse
						id="base-in"
						cx="500"
						cy="500"
						rx="240"
						ry="80"
						fill="none"
						stroke="rgba(255, 255, 255, 0.05)"
						stroke-width="1"
					/>

					<!-- Animated comets (Energy) -->
					<ellipse
						id="anim-out"
						cx="500"
						cy="500"
						rx="420"
						ry="140"
						pathLength="100"
						fill="none"
						stroke="url(#grad-out)"
						stroke-width="2.5"
					/>
					<ellipse
						id="anim-in"
						cx="500"
						cy="500"
						rx="240"
						ry="80"
						pathLength="100"
						fill="none"
						stroke="url(#grad-in)"
						stroke-width="3"
					/>
				</defs>

				<!-- ==========================================
                 LAYER 1: Outer Torus (Faint Structure)
                 ========================================== -->
				<g class="spin-slow-cw" filter="url(#soft-glow)">
					<use href="#base-out" transform="rotate(0 500 500)" />
					<use href="#base-out" transform="rotate(20 500 500)" />
					<use href="#base-out" transform="rotate(40 500 500)" />
					<use href="#base-out" transform="rotate(60 500 500)" />
					<use href="#base-out" transform="rotate(80 500 500)" />
					<use href="#base-out" transform="rotate(100 500 500)" />
					<use href="#base-out" transform="rotate(120 500 500)" />
					<use href="#base-out" transform="rotate(140 500 500)" />
					<use href="#base-out" transform="rotate(160 500 500)" />
					<use href="#base-out" transform="rotate(180 500 500)" />
					<use href="#base-out" transform="rotate(200 500 500)" />
					<use href="#base-out" transform="rotate(220 500 500)" />
					<use href="#base-out" transform="rotate(240 500 500)" />
					<use href="#base-out" transform="rotate(260 500 500)" />
					<use href="#base-out" transform="rotate(280 500 500)" />
					<use href="#base-out" transform="rotate(300 500 500)" />
					<use href="#base-out" transform="rotate(320 500 500)" />
					<use href="#base-out" transform="rotate(340 500 500)" />
				</g>

				<!-- ==========================================
                 LAYER 2: Outer Torus (Animated Comets)
                 Mathematical Delay = Duration (7.2s) / 18 Items = -0.4s steps.
                 This creates the perfect 3D helix wave illusion.
                 ========================================== -->
				<g class="spin-slow-cw" filter="url(#ultra-glow)">
					<use href="#anim-out" class="dash-out" style="animation-delay: 0s" transform="rotate(0 500 500)" />
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -0.4s"
						transform="rotate(20 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -0.8s"
						transform="rotate(40 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -1.2s"
						transform="rotate(60 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -1.6s"
						transform="rotate(80 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -2s"
						transform="rotate(100 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -2.4s"
						transform="rotate(120 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -2.8s"
						transform="rotate(140 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -3.2s"
						transform="rotate(160 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -3.6s"
						transform="rotate(180 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -4s"
						transform="rotate(200 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -4.4s"
						transform="rotate(220 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -4.8s"
						transform="rotate(240 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -5.2s"
						transform="rotate(260 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -5.6s"
						transform="rotate(280 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -6s"
						transform="rotate(300 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -6.4s"
						transform="rotate(320 500 500)"
					/>
					<use
						href="#anim-out"
						class="dash-out"
						style="animation-delay: -6.8s"
						transform="rotate(340 500 500)"
					/>
				</g>

				<!-- ==========================================
                 LAYER 3: Inner Torus (Faint Structure)
                 ========================================== -->
				<g class="spin-slow-ccw" filter="url(#soft-glow)">
					<use href="#base-in" transform="rotate(0 500 500)" />
					<use href="#base-in" transform="rotate(20 500 500)" />
					<use href="#base-in" transform="rotate(40 500 500)" />
					<use href="#base-in" transform="rotate(60 500 500)" />
					<use href="#base-in" transform="rotate(80 500 500)" />
					<use href="#base-in" transform="rotate(100 500 500)" />
					<use href="#base-in" transform="rotate(120 500 500)" />
					<use href="#base-in" transform="rotate(140 500 500)" />
					<use href="#base-in" transform="rotate(160 500 500)" />
					<use href="#base-in" transform="rotate(180 500 500)" />
					<use href="#base-in" transform="rotate(200 500 500)" />
					<use href="#base-in" transform="rotate(220 500 500)" />
					<use href="#base-in" transform="rotate(240 500 500)" />
					<use href="#base-in" transform="rotate(260 500 500)" />
					<use href="#base-in" transform="rotate(280 500 500)" />
					<use href="#base-in" transform="rotate(300 500 500)" />
					<use href="#base-in" transform="rotate(320 500 500)" />
					<use href="#base-in" transform="rotate(340 500 500)" />
				</g>

				<!-- ==========================================
                 LAYER 4: Inner Torus (Animated Comets)
                 Mathematical Delay = Duration (3.6s) / 18 Items = -0.2s steps.
                 Flows in reverse direction from the outer torus.
                 ========================================== -->
				<g class="spin-slow-ccw" filter="url(#ultra-glow)">
					<use href="#anim-in" class="dash-in" style="animation-delay: 0s" transform="rotate(0 500 500)" />
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -0.2s"
						transform="rotate(20 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -0.4s"
						transform="rotate(40 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -0.6s"
						transform="rotate(60 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -0.8s"
						transform="rotate(80 500 500)"
					/>
					<use href="#anim-in" class="dash-in" style="animation-delay: -1s" transform="rotate(100 500 500)" />
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -1.2s"
						transform="rotate(120 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -1.4s"
						transform="rotate(140 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -1.6s"
						transform="rotate(160 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -1.8s"
						transform="rotate(180 500 500)"
					/>
					<use href="#anim-in" class="dash-in" style="animation-delay: -2s" transform="rotate(200 500 500)" />
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -2.2s"
						transform="rotate(220 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -2.4s"
						transform="rotate(240 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -2.6s"
						transform="rotate(260 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -2.8s"
						transform="rotate(280 500 500)"
					/>
					<use href="#anim-in" class="dash-in" style="animation-delay: -3s" transform="rotate(300 500 500)" />
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -3.2s"
						transform="rotate(320 500 500)"
					/>
					<use
						href="#anim-in"
						class="dash-in"
						style="animation-delay: -3.4s"
						transform="rotate(340 500 500)"
					/>
				</g>

				<!-- ==========================================
                 LAYER 5: Central Singularity Core
                 ========================================== -->
				<g class="core-pulse">
					<!-- Outer rotating dashed ring -->
					<circle
						cx="500"
						cy="500"
						r="80"
						fill="none"
						stroke="url(#grad-out)"
						stroke-width="1.5"
						class="nexus-ring-1"
						filter="url(#ultra-glow)"
						opacity="0.7"
					/>

					<!-- Inner rotating dashed ring -->
					<circle
						cx="500"
						cy="500"
						r="55"
						fill="none"
						stroke="url(#grad-in)"
						stroke-width="2.5"
						class="nexus-ring-2"
						filter="url(#ultra-glow)"
					/>

					<!-- Center Dark Void -->
					<circle
						cx="500"
						cy="500"
						r="40"
						fill="#020204"
						stroke="url(#grad-out)"
						stroke-width="2"
						filter="url(#soft-glow)"
					/>

					<!-- Core Photon -->
					<circle cx="500" cy="500" r="5" fill="#ffffff" filter="url(#ultra-glow)" />
				</g>
			</svg>
		</div>
	</body>
</html>
