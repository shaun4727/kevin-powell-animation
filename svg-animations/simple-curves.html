<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Traveling Points on Curved Lines</title>
		<style>
			/* =========================================
           Base Layout & Dark Theme
           ========================================= */
			body,
			html {
				margin: 0;
				padding: 0;
				width: 100vw;
				height: 100vh;
				background-color: #030509;
				background: radial-gradient(circle at 50% 50%, #0a0d18 0%, #030509 100%);
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
				font-family:
					system-ui,
					-apple-system,
					sans-serif;
			}

			.canvas-container {
				width: 100%;
				max-width: 1000px;
				aspect-ratio: 16 / 9;
				position: relative;
			}

			svg {
				width: 100%;
				height: 100%;
				mix-blend-mode: screen; /* Enhances the glow effect when elements overlap */
			}
		</style>
	</head>
	<body>
		<div class="canvas-container">
			<!-- 1000x600 Coordinate space for wide horizontal curves -->
			<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
				<defs>
					<!-- Premium Glow Filter for the traveling points -->
					<filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
						<feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
						<feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur2" />
						<feMerge>
							<feMergeNode in="blur2" />
							<feMergeNode in="blur1" />
							<feMergeNode in="SourceGraphic" />
						</feMerge>
					</filter>

					<!-- Subtle gradients for the curved tracks -->
					<linearGradient id="grad-track-1" x1="0%" y1="0%" x2="100%" y2="0%">
						<stop offset="0%" stop-color="#00f0ff" stop-opacity="0.1" />
						<stop offset="50%" stop-color="#00f0ff" stop-opacity="0.6" />
						<stop offset="100%" stop-color="#00f0ff" stop-opacity="0.1" />
					</linearGradient>

					<linearGradient id="grad-track-2" x1="0%" y1="0%" x2="100%" y2="0%">
						<stop offset="0%" stop-color="#ff007a" stop-opacity="0.1" />
						<stop offset="50%" stop-color="#ff007a" stop-opacity="0.6" />
						<stop offset="100%" stop-color="#ff007a" stop-opacity="0.1" />
					</linearGradient>

					<linearGradient id="grad-track-3" x1="0%" y1="0%" x2="100%" y2="0%">
						<stop offset="0%" stop-color="#ffd700" stop-opacity="0.1" />
						<stop offset="50%" stop-color="#ffd700" stop-opacity="0.6" />
						<stop offset="100%" stop-color="#ffd700" stop-opacity="0.1" />
					</linearGradient>
				</defs>

				<!-- ==========================================
                 The 3 Curved Lines (Tracks)
                 Defined using Cubic Bezier (C) paths.
                 All paths start at (100, 300) and end at (900, 300)
                 ========================================== -->
				<!-- Top Arc -->
				<path
					id="curve-top"
					d="M 100 300 C 300 50, 700 50, 900 300"
					fill="none"
					stroke="url(#grad-track-1)"
					stroke-width="2"
					stroke-linecap="round"
				/>

				<!-- Middle S-Curve -->
				<path
					id="curve-mid"
					d="M 100 300 C 400 150, 600 450, 900 300"
					fill="none"
					stroke="url(#grad-track-2)"
					stroke-width="2"
					stroke-linecap="round"
				/>

				<!-- Bottom Arc -->
				<path
					id="curve-bot"
					d="M 100 300 C 300 550, 700 550, 900 300"
					fill="none"
					stroke="url(#grad-track-3)"
					stroke-width="2"
					stroke-linecap="round"
				/>

				<!-- ==========================================
                 The 3 Traveling Points
                 Using <animateMotion> to natively follow the paths
                 ========================================== -->

				<!-- Point 1: Cyan (Follows Top Curve) -->
				<circle r="6" fill="#00f0ff" filter="url(#neon-glow)">
					<animateMotion dur="4s" repeatCount="indefinite" calcMode="linear">
						<mpath href="#curve-top" />
					</animateMotion>
				</circle>

				<!-- Point 2: Magenta (Follows Middle Curve) -->
				<circle r="6" fill="#ff007a" filter="url(#neon-glow)">
					<animateMotion dur="5s" repeatCount="indefinite" calcMode="linear">
						<mpath href="#curve-mid" />
					</animateMotion>
				</circle>

				<!-- Point 3: Gold (Follows Bottom Curve) -->
				<circle r="6" fill="#ffd700" filter="url(#neon-glow)">
					<animateMotion dur="6s" repeatCount="indefinite" calcMode="linear">
						<mpath href="#curve-bot" />
					</animateMotion>
				</circle>
			</svg>
		</div>
	</body>
</html>
